{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
<link rel="shortcut icon" href="{% static 'images/weekfav.jpeg' %}" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upload Reel</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Poppins", sans-serif;
            background: #fff;
        }

        .container {
            max-width: 450px;
            margin: 0 auto;
            padding: 25px;
            text-align: center;
        }

        h2 {
            font-weight: 600;
            margin-bottom: 25px;
        }

        /* Preview Box */
        .preview-box {
            width: 100%;
            aspect-ratio: 14/16;
            background: #f1f1f1;
            border-radius: 12px;
            margin-bottom: 20px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .preview-box video,
        .preview-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Upload button */
        .upload-btn {
            width: 90px;
            height: 90px;
            background: #efefef;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border: 2px solid #dbdbdb;
            transition: 0.3s;
        }

        .upload-btn:hover {
            background: #e3e3e3;
        }

        .upload-btn span {
            font-size: 48px;
            color: #444;
            font-weight: 600;
        }

        .file-input {
            display: none;
        }

        /* --- Description Styling --- */
        form p {
            text-align: left !important;
            margin-bottom: 12px;
        }

        form p label {
            display: block;
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        form p textarea,
        form p input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1.5px solid #ddd;
            border-radius: 10px;
            background: #fafafa;
            outline: none;
            font-size: 15px;
            resize: none;
            transition: 0.2s;
        }

        form p textarea:focus,
        form p input:focus {
            border-color: #0095F6;
            background: #fff;
        }

        /* Post Button */
        button {
            width: 100%;
            margin-top: 25px;
            padding: 12px;
            background: #0095F6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 17px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #007bd1;
        }
    </style>
</head>
<body>

{% include 'NavBar.html' %}

<style>
    .menu-btn{
        color: black;
        margin-bottom:30px;
    }
    #id_reel{
        display: none;
    }
    label{
        display: none;
    }

    .nav-links button{
        margin: auto;
    }
    .nav-links{
        align-items: center;
    }
</style>

<div class="container">

    <h2>Create Reel</h2>

    <!-- Preview Box -->
    <div class="preview-box" id="preview">
        <label for="id_reel" class="upload-btn">
            <span>+</span>
        </label>
    </div>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
<style>
        p:has(#id_reel) {
            display: none !important;
        }
    </style>
        <!-- SHOW Django Form (Description input) -->
        {{ f.as_p }}

        <button type="submit">Share Reel</button>
    </form>
</div>

{% include 'footer.html' %}

<script>
    const input = document.getElementById("id_reel");
    const preview = document.getElementById("preview");

    input.addEventListener("change", () => {
        preview.innerHTML = "";

        const file = input.files[0];
        if (!file) return;

        const url = URL.createObjectURL(file);

        if (file.type.startsWith("video")) {
            const video = document.createElement("video");
            video.src = url;
            video.controls = true;
            preview.appendChild(video);
        } else if (file.type.startsWith("image")) {
            const img = document.createElement("img");
            img.src = url;
            preview.appendChild(img);
        }
    });
</script>

</body>
</html>
