<!DOCTYPE html>
<html>
<head>
    <title>{{ post.heading }}</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            margin: 0;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.1);
        }

        h1 {
            margin-bottom: 15px;
        }

        .media img, .media video {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .content {
            line-height: 1.7;
            color: #333;
        }

        .back {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: #007bff;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>{{ post.heading }}</h1>

    <div class="media">
        {% if post.media_type == 'image' and post.image %}
            <img src="{{ post.image.url }}">
        {% elif post.video %}
            <video controls>
                <source src="{{ post.video.url }}">
            </video>
        {% endif %}
    </div>

    <div class="content">
        {{ post.news_content }}
    </div>

    <a href="{% url 'news_list' %}" class="back">⬅ Back to News</a>

</div>

</body>
</html>
