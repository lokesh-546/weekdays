{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
      
<link rel="shortcut icon" href="{% static 'images/weekfav.jpeg' %}" type="image/x-icon">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forget Password</title>
    <link rel="stylesheet" href="{% static 'css/register.css' %}" />
  </head>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Poppins", sans-serif;
      background: #f3f5f7;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .register-form-container {
      background: #ffffff;
      width: 380px;
      padding: 35px;
      border-radius: 14px;
      box-shadow: 0px 8px 20px rgba(0, 0, 0, 0.1);
      animation: fadeIn 0.5s ease-in-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .formHeading {
      text-align: center;
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 20px;
      color: #333;
    }

    .commonFields label {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 5px;
      display: block;
      color: #333;
    }

    .commonFields input {
      width: 90%;
      padding: 12px 14px;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
      font-size: 14px;
      margin-bottom: 15px;
      transition: 0.3s ease;
    }

    .commonFields input:focus {
      border-color: #007bff;
      box-shadow: 0px 0px 4px rgba(0, 123, 255, 0.3);
    }

    button {
      width: 100%;
      padding: 12px;
      background: #007bff;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      margin-top: 15px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.3s ease;
    }

    button:hover {
      background: #0056b3;
    }

    p {
      font-size: 14px;
      text-align: center;
      margin-top: 12px;
    }

    a {
      color: #007bff;
      font-weight: 600;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .error {
      color: #d9534f;
      background: #f8d7da;
      padding: 8px 12px;
      border-radius: 5px;
      margin-bottom: 10px;
      border-left: 4px solid #d9534f;
      font-size: 14px;
    }
  </style>

  <body>
    <div class="register-form-container">
      <h1 class="formHeading">Reset Password</h1>

      <div id="errorBox"></div>

      <form id="otpForm" onsubmit="event.preventDefault(); sendOtp();">
        {% csrf_token %}

        <!-- PHONE FIELD -->
        <div class="commonFields">
          <label>Phone Number/Email/Username</label>
          <input
            type="text"
            id="phone"
            placeholder="Enter Phone/Email/Username"
            required
          />
        </div>

        <!-- OTP FIELD (HIDDEN INITIALLY) -->
        <div class="commonFields" id="otpField" style="display: none">
          <label>Enter OTP</label>
          <input type="text" id="otp" placeholder="Enter OTP" />
        </div>

        <!-- BUTTON -->
        <button id="submitBtn" type="submit">Send OTP</button>

        <p>
          Remember password?
          <a href="{% url 'prop:login' %}">Login</a>
        </p>
      </form>
    </div>

    <script>
      function sendOtp() {
        let value = document.getElementById("phone").value;
        let btn = document.getElementById("submitBtn");
        let errorBox = document.getElementById("errorBox");

        if (btn.innerText === "Send OTP") {
          // SEND OTP
          fetch(`/pass/send-otp/?value=${value}`)
            .then((res) => res.json())
            .then((data) => {
              if (data.error) {
                errorBox.innerHTML = `<p class="error">${data.error}</p>`;
              } else {
                errorBox.innerHTML = `<p class="error" style="color:green;">OTP sent successfully</p>`;
                document.getElementById("otpField").style.display = "block";
                btn.innerText = "Verify OTP";

                // Store the phone number temporarily
                document
                  .getElementById("phone")
                  .setAttribute("data-phone", data.phone);
              }
            });
        } else {
          // VERIFY OTP
          let otp = document.getElementById("otp").value;
          let phone = document
            .getElementById("phone")
            .getAttribute("data-phone");

          fetch(`/pass/verify-otp/?phone=${phone}&otp=${otp}`)
            .then((res) => res.json())
            .then((data) => {
              if (data.error) {
                errorBox.innerHTML = `<p class="error">${data.error}</p>`;
              } else {
                errorBox.innerHTML = `<p class="error" style="color:green;">OTP Verified!</p>`;
                window.location.href = "/reset-password";
              }
            });
        }
      }
    </script>
  </body>
</html>
