<!DOCTYPE html>
<html>
<head>
    <title>Upload Image</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
        }

        .container {
            width: 600px;
            margin: 40px auto;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }
        label {
            font-weight: bold;
        }

        /* Upload Box */
        .upload-box {
            width: 100%;
            height: 300px;
            border: 2px dashed #bbb;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            cursor: pointer;
            background: #fff;
            transition: 0.3s;
            position: relative;
        }

        .upload-box:hover {
            border-color: #007bff;
            background: #f0f8ff;
        }

        .upload-box span {
            font-size: 40px;
            color: #999;
        }

        .upload-box p {
            margin-top: 10px;
            color: #666;
        }

        input[type="file"] {
            display: none;
        }

        /* Preview */
        .preview img {
            max-width: 100%;
            border-radius: 10px;
            margin-top: 15px;
        }

        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
        }

        button:hover {
            background: #218838;
        }

        .back-btn {
            display: block;
            margin-top: 10px;
            text-decoration: none;
            color: #444;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Upload Image</h2>
<a href="{% url 'prop:profiless' %}">👤</a>
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <!-- Upload Box -->
        <label class="upload-box">
            <span>+</span>
            <p>Upload Image</p>
            {{ form.image }}
        </label>

        <!-- Preview -->
        <div class="preview">
            <img id="previewImg" style="display:none;">
        </div>
<br><br>
        <!-- Description -->
        <label style="margin-right: 100% ;">Description:</label>{{ form.description }}

        <button type="submit">Save</button>
    </form>

    <a href="{% url 'prop:image_list' %}" class="back-btn">⬅ Back</a>
</div>

<script>
    const input = document.querySelector('input[type="file"]');
    const preview = document.getElementById('previewImg');

    input.addEventListener('change', function () {
        const file = this.files[0];

        if (file) {
            const reader = new FileReader();
            reader.onload = function (e) {
                preview.src = e.target.result;
                preview.style.display = "block";
            }
            reader.readAsDataURL(file);
        }
    });
</script>

</body>
</html>
