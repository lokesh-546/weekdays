{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="shortcut icon" href="{% static 'images/weekfav.jpeg' %}" type="image/x-icon">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<style>

/* ===== FULL RESET ===== */
html, body{
  margin:0 !important;
  padding:0 !important;
  width:100%;
  height:100%;
  overflow-x:hidden;
  font-family:'Segoe UI', sans-serif;
}

/* Remove any parent container spacing */
body > *{
  margin:0;
}

/* ===== HEADER ===== */
.page-header{
  width:100vw;              /* Full viewport width */
  margin:0;
  padding:15px 50px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:#1D4384;
  position:sticky;
  top:0;
  left:0;
  z-index:1000;
  box-shadow:0 2px 8px rgba(0,0,0,0.15);
}

/* Logo */
.logo img{
  height:45px;
  cursor:pointer;
}

/* Center Title */
.page-title{
  flex:1;
  text-align:center;
  font-size:24px;
  font-weight:600;
  color:white;
}

/* Back Button */
.back-btn{
 
  color:white;
  padding:8px 22px;
  border-radius:8px;
  text-decoration:none;
  font-weight:500;
  margin-right: 130px;
  margin-top: 10px;
}

.back-btn:hover{
  background:#163b66;
}

</style>
</head>

<body>

<header class="page-header">

  <div class="logo" onclick="window.location.href='/'">
    <img src="{% static 'images/logo.jpg' %}" alt="Logo">
  </div>

  <div class="page-title">
    Admin Dashboard
  </div>

  <a href="/property/stats/" class="back-btn">
     Back to Admin
  </a>

</header>

</body>
</html>
